name: Mise à jour AIS temps réel

on:
  schedule:
    - cron: '*/15 * * * *' # S'exécute toutes les 15 minutes
  workflow_dispatch: # Permet de le lancer manuellement pour tester

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Installer les dépendances
        run: pip install websockets pandas

      - name: Exécuter la collecte
        env:
          AISSTREAM_KEY: ${{ secrets.AISSTREAM_KEY }}
        run: python collect_ais.py

      - name: Sauvegarder les données sur le dépôt
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add vessels.json
          git commit -m "⚡ Mise à jour automatique des navires (AIS)" || exit 0
          git push
